<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="The page or document you are looking for does not exist. Return to the Saint Sword industrial sourcing platform.">
  <title>404 — Page Not Found | Saint Sword</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/images/logo.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    .error-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background:
        url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.055'/%3E%3C/svg%3E"),
        radial-gradient(circle at 50% 50%, rgba(105, 143, 135, 0.38) 0%, transparent 60%),
        radial-gradient(circle at 10% 10%, rgba(197, 160, 89, 0.12) 0%, transparent 45%),
        linear-gradient(135deg, #0A0D0C 0%, #131A17 100%) !important;
      background-size: auto !important;
      position: relative;
      overflow: hidden;
      padding: 2rem;
    }

    .error-bg-accent {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: clamp(200px, 40vw, 450px);
      height: clamp(200px, 40vw, 450px);
      opacity: 0.03;
      pointer-events: none;
      z-index: 1;
    }

    .error-bg-accent img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .error-bg-accent picture {
      display: block;
      width: 100%;
      height: 100%;
    }

    .error-content {
      position: relative;
      z-index: 2;
      text-align: center;
      max-width: 540px;
      margin: 0 auto;
      animation: pageFadeIn 0.8s ease-in-out forwards;
    }

    .error-code {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: clamp(6rem, 15vw, 10rem);
      font-style: italic;
      line-height: 0.9;
      color: #698F87;
      margin-bottom: 1.5rem;
    }

    .error-title {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: clamp(1.25rem, 4vw, 1.8rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #FAFCFB;
      margin-bottom: 1rem;
    }

    .error-desc {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      color: #A6BCB7;
      margin-bottom: 2.5rem;
    }

    .error-btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--gold);
      color: #FFFFFF !important;
      border: 1px solid var(--gold);
      padding: 16px 36px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .error-btn-primary:hover {
      background: var(--gold-light);
      border-color: var(--gold-light);
      transform: translateY(-2px);
    }

    .error-btn-primary:active {
      transform: scale(0.98);
      transition: transform 0.1s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .error-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: clamp(64px, 8vh, 72px);
      padding: 0 5%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 10;
      background: transparent;
    }

    .error-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      height: 100%;
      text-decoration: none;
    }

    .error-logo-mark {
      height: 28px;
      width: 28px;
    }

    .error-logo-mark img {
      height: 100%;
      width: auto;
      display: block;
      filter: brightness(0) invert(1);
    }

    .error-logo-mark picture,
    .error-logo-text picture {
      display: block;
      height: 100%;
      width: auto;
    }

    .error-logo-text {
      height: 16px;
    }

    .error-logo-text img {
      height: 100%;
      width: auto;
      display: block;
      filter: brightness(0) invert(1);
    }
  </style>
</head>

<body>

  <header class="error-header">
    <a href="index.html" class="error-logo">
      <div class="error-logo-mark">
        <picture>
          <source srcset="assets/images/logo.webp" type="image/webp">
          <img src="assets/images/logo.png" alt="Saint Sword Logo" width="28" height="28" decoding="async">
        </picture>
      </div>
      <div class="error-logo-text">
        <picture>
          <source srcset="assets/images/logo-text.webp" type="image/webp">
          <img src="assets/images/logo-text.png" alt="SAINT SWORD" width="120" height="16" decoding="async">
        </picture>
      </div>
    </a>
  </header>

  <main class="error-container">
    <div class="error-bg-accent">
      <picture>
        <source srcset="assets/images/logo.webp" type="image/webp">
        <img src="assets/images/logo.png" alt="Saint Sword Emblem" width="300" height="300" decoding="async">
      </picture>
    </div>

    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">Corridor Not Found</h1>
      <p class="error-desc">The specific sourcing route, document, or trade platform section you were looking for cannot
        be located on our servers.</p>
      <a href="index.html" class="error-btn-primary">Return to Sourcing Platform <span class="btn-arrow">→</span></a>
    </div>
  </main>

</body>

</html>
